services:
  backend:
    environment:
      EXPERIMENT_MODE: static_resilience
      EXPERIMENT_SCENARIO: ${EXPERIMENT_SCENARIO:-SS}
      EXPERIMENT_RUN: ${EXPERIMENT_RUN:-1}

      ENABLE_STATIC_RESILIENCE: "true"
      ENABLE_RAMA_RESILIENCE: "false"

      ENABLE_TIMEOUT: "true"
      ENABLE_RETRY: "true"
      ENABLE_CIRCUIT_BREAKER: "true"
      ENABLE_HEALTH_CHECK: "true"

      ENABLE_CONTEXT_AWARE_FALLBACK: "false"
      ENABLE_COMPUTE_PROFILE_AWARE_POLICY: "false"
      ENABLE_FALLBACK_COORDINATION: "false"
      ENABLE_PARTIAL_RESPONSE: "false"

      ENABLE_RESPONSE_CLASSIFIER: "true"
      ENABLE_EXPERIMENT_LOGGING: "true"
      ENABLE_EXPERIMENT_METRICS: "true"

      ENABLE_AI_CACHE_EXPERIMENT: "false"
      RATE_LIMIT_REQUESTS: "100000"
      RATE_LIMIT_WINDOW: "60"
      AI_RATE_LIMIT_REQUESTS: "100000"

      REQUEST_TIMEOUT_SECONDS: "90"
      STATIC_TIMEOUT_SECONDS: "90"
      STATIC_RETRY_MAX_ATTEMPTS: "1"
      STATIC_RETRY_BACKOFF_MS: "250"
      STATIC_CB_FAILURE_THRESHOLD: "5"
      STATIC_CB_RESET_TIMEOUT_SECONDS: "30"
      STATIC_CB_HALF_OPEN_MAX_REQUESTS: "3"
