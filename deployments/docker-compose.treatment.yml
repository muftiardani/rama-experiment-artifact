services:
  backend:
    environment:
      EXPERIMENT_MODE: treatment
      EXPERIMENT_SCENARIO: ${EXPERIMENT_SCENARIO:-SS}
      EXPERIMENT_RUN: ${EXPERIMENT_RUN:-1}

      ENABLE_STATIC_RESILIENCE: "false"
      ENABLE_RAMA_RESILIENCE: "true"

      ENABLE_TIMEOUT: "true"
      ENABLE_RETRY: "true"
      ENABLE_CIRCUIT_BREAKER: "true"
      ENABLE_HEALTH_CHECK: "true"

      ENABLE_CONTEXT_AWARE_FALLBACK: "true"
      ENABLE_COMPUTE_PROFILE_AWARE_POLICY: "true"
      ENABLE_FALLBACK_COORDINATION: "true"
      ENABLE_PARTIAL_RESPONSE: "true"

      ENABLE_RESPONSE_CLASSIFIER: "true"
      ENABLE_EXPERIMENT_LOGGING: "true"
      ENABLE_EXPERIMENT_METRICS: "true"

      ENABLE_AI_CACHE_EXPERIMENT: "false"
      RATE_LIMIT_REQUESTS: "100000"
      RATE_LIMIT_WINDOW: "60"
      AI_RATE_LIMIT_REQUESTS: "100000"

      REQUEST_TIMEOUT_SECONDS: "90"
      RAMA_DEFAULT_TIMEOUT_SECONDS: "90"
      RAMA_CB_FAILURE_THRESHOLD: "5"
      RAMA_CB_RESET_TIMEOUT_SECONDS: "30"
      RAMA_CB_HALF_OPEN_MAX_REQUESTS: "3"
